# Compose topology for the Identity-First AI Agent Governance POC.
#
# Sprint 0 state (this file):
#   - hr_server, agent, client     ← existing services; still functional
#   - orchestrator, hr_agent,
#     it_agent, it_server          ← v3 scaffolds; /health-only until Sprint 1
#
# Sprint 1 will:
#   - Wire orchestrator/hr_agent/it_agent/it_server with real logic
#   - Reroute the SPA from `agent` to `orchestrator` (port 8080)
#
# Sprint 1 DoD: delete `agent/` service from this file; agent/ stays archived
# in _archive/agent.before-v3/ + git tag pre-v3-orchestrator.

networks:
  demo-net:
    driver: bridge

services:
  # ─── Existing services (unchanged) ─────────────────────────────────────────
  hr_server:
    build:
      context: .
      dockerfile: hr_server/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"  # BLOCK-D: bind loopback only
    env_file:
      - ./hr_server/.env
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      - HR_SERVER_HOST=0.0.0.0
      - MCP_ALLOWED_HOSTS="127.0.0.1,localhost,hr_server"
      # Sprint 0: introspection feature-flagged OFF (Sprint 2 turns ON)
      - HR_INTROSPECT_ENABLED=${HR_INTROSPECT_ENABLED:-false}
      # Sprint 3 3A.2: shared secret for /internal/events fan-out (BLOCK-B simple).
      # Operator MUST set this in shell or .env (not committed) before `make demo-up`.
      - INTERNAL_REVOKE_SHARED_SECRET=${INTERNAL_REVOKE_SHARED_SECRET:-}
      - UVICORN_WORKERS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demo-net

  agent:
    build:
      context: ./agent
    ports:
      - "5001:5001"
    env_file:
      - ./agent/.env
    environment:
      - HR_MCP_SERVER_URL=http://hr_server:8000/mcp
      - AGENT_SERVER_HOST=0.0.0.0
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
    depends_on:
      hr_server:
        condition: service_healthy
    networks:
      - demo-net

  client:
    build:
      context: ./client
    ports:
      - "${CLIENT_PORT:-3001}:3000"
    env_file:
      - ./client/.env
    environment:
      - AGENT_SERVER_URL=http://localhost:5001
      - HR_SERVER_URL=http://localhost:8000
      - REDIRECT_URI=${REDIRECT_URI:-http://localhost:3001/callback}
    depends_on:
      - agent
    networks:
      - demo-net

  # ─── v3 scaffolds (Sprint 0 — /health-only) ────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      # Container always listens on 8080 internally; host port 8090
      # avoids a conflict with a common SSH-tunnel default. Sprint 1
      # may switch this to 5001 once `agent` service is removed.
      - "8090:8080"
    env_file:
      - ./orchestrator/.env
    environment:
      - ORCHESTRATOR_HOST=0.0.0.0
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      - AGENT_CARDS_DIR=/app/agent_cards
      # Sprint 3 3A.2: shared secret + fan-out target URLs.
      - INTERNAL_REVOKE_SHARED_SECRET=${INTERNAL_REVOKE_SHARED_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HR_AGENT_URL=http://hr_agent:8001
      - IT_AGENT_URL=http://it_agent:8002
      - HR_SERVER_URL=http://hr_server:8000
      - IT_SERVER_URL=http://it_server:8004
      # 3A.2.2: must be EXACTLY registered as a Callback URL on the
      # orchestrator-mcp-client app in IS Console. WSO2 IS rejects with
      # "Post logout URI does not match" otherwise (live-walk 2026-05-09).
      # Default = orchestrator's port 8090 since the SPA is served from
      # orchestrator/main.py StaticFiles (the legacy `client:3001` container
      # is no longer the SPA host).
      - POST_LOGOUT_REDIRECT_URI=${POST_LOGOUT_REDIRECT_URI:-http://localhost:8090/}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    # POC constraint: single replica only (per milestone-plan §5.3 + R7 determinism).
    # CI asserts this; multi-replica needs sticky sessions + Redis-backed state.
    deploy:
      replicas: 1
    depends_on:
      hr_agent:
        condition: service_healthy
      it_agent:
        condition: service_healthy
    networks:
      - demo-net

  hr_agent:
    build:
      context: .
      dockerfile: hr_agent/Dockerfile
    ports:
      - "127.0.0.1:8001:8001"  # BLOCK-D: bind loopback only; receiver not on host LAN
    env_file:
      - ./hr_agent/.env
    environment:
      - HR_AGENT_HOST=0.0.0.0
      - HR_MCP_SERVER_URL=http://hr_server:8000
      - HR_EXPECTED_INBOUND_AUD=${ORCHESTRATOR_MCP_CLIENT_ID:-Ry9Wx_Q7w2FSi27miUpYr3O0xR4a}
      # Sprint 3 3A.2.
      - INTERNAL_REVOKE_SHARED_SECRET=${INTERNAL_REVOKE_SHARED_SECRET:-}
      - UVICORN_WORKERS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      hr_server:
        condition: service_healthy
    networks:
      - demo-net

  it_agent:
    build:
      context: .
      dockerfile: it_agent/Dockerfile
    ports:
      - "127.0.0.1:8002:8002"  # BLOCK-D: bind loopback only
    env_file:
      - ./it_agent/.env
    environment:
      - IT_AGENT_HOST=0.0.0.0
      - IT_MCP_SERVER_URL=http://it_server:8004
      - IT_EXPECTED_INBOUND_AUD=${ORCHESTRATOR_MCP_CLIENT_ID:-Ry9Wx_Q7w2FSi27miUpYr3O0xR4a}
      # Sprint 3 3A.2.
      - INTERNAL_REVOKE_SHARED_SECRET=${INTERNAL_REVOKE_SHARED_SECRET:-}
      - UVICORN_WORKERS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      it_server:
        condition: service_healthy
    networks:
      - demo-net

  it_server:
    build:
      context: .
      dockerfile: it_server/Dockerfile
    ports:
      - "127.0.0.1:8004:8004"  # BLOCK-D: bind loopback only
    env_file:
      - ./it_server/.env
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      - IT_SERVER_HOST=0.0.0.0
      - MCP_ALLOWED_HOSTS="127.0.0.1,localhost,it_server"
      # Sprint 3 3A.2.
      - INTERNAL_REVOKE_SHARED_SECRET=${INTERNAL_REVOKE_SHARED_SECRET:-}
      - UVICORN_WORKERS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8004/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demo-net

  # ─── Sprint 3 spike: BCL capture rig (profile: spike-bcl) ─────────────────
  # Runs ONLY for the C12 logout capability spike (D3 design input). Gated by
  # the `spike-bcl` compose profile so `make demo-up` does NOT start it.
  # Bring up via:  ./scripts/spike-bcl-up.sh
  #
  # The listener is reached from the AWS VM (where WSO2 IS lives) via a
  # reverse SSH tunnel — the laptop runs `autossh -R 8123:localhost:8123 …`
  # so that `localhost:8123` on the AWS VM forwards back to this container's
  # published host port (127.0.0.1:8123 on the laptop). See
  # docs/spikes/c12-bcl-spike-setup.md for first-time setup.
  bcl-listener:
    image: python:3.11-slim
    profiles: ["spike-bcl"]
    command: ["python", "-u", "/app/bcl_listener.py"]
    volumes:
      - ./tools/bcl_listener.py:/app/bcl_listener.py:ro
      - ./tools/_bcl_log:/data
    environment:
      - BCL_LISTEN_PORT=8123
    # Bind to loopback only so SSH-R reaches it but the laptop's LAN does
    # not expose the listener.
    ports:
      - "127.0.0.1:8123:8123"
    networks:
      - demo-net
