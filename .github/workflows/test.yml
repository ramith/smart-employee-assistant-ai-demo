name: tests

on:
  push:
    branches: [main, agent-2-agent]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install pytest pytest-asyncio pytest-httpx anyio
          pip install pyjwt[crypto] httpx pydantic fastapi starlette urllib3
      - run: ./tools/run-tests.sh
